<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icon-180.png') }}">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <!-- Footer CSS -->
    <style>
        .site-footer {
            position: fixed;
            bottom: 10px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #777;
        }
    </style>
</head>

<body class="bg-dark text-white">

<div class="container mt-5">
    <h1 class="text-center mb-4">Video Downloader</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, msg in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }}">
                    {{ msg }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <label for="url" class="form-label">Video URL:</label>
            <input type="text" class="form-control" id="url" name="url">
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="audio" name="audio">
            <label class="form-check-label" for="audio">Download as Audio (MP3)</label>
        </div>

        <div class="mb-3">
            <label for="resolution">Select Resolution:</label>
            <select name="resolution" id="resolution" class="form-select">
                <option value="best">Best</option>
                <option value="1080p">1080p</option>
                <option value="720p">720p</option>
                <option value="480p">480p</option>
                <option value="360p">360p</option>
                <option value="240p">240p</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">
            📥 Download
        </button>
    </form>
</div>

<!-- Footer -->
<footer class="site-footer">
    © Ansuman Sahoo 2026.
</footer>

</body>
</html>
